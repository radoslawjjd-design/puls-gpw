name: "AI Code Reviewer"
description: >-
  Run the single-shot AI code-review scorer (Vercel AI SDK 6 + Gemini via
  Vertex AI) over a PR diff and expose the structured verdict + per-criterion
  scores as outputs for a downstream merge gate. Builds the Node package at run
  time — no committed dist/.

inputs:
  pr-title:
    description: "PR title — treated by the agent as UNTRUSTED data to review."
    required: true
  pr-body:
    description: "PR body — treated by the agent as UNTRUSTED data to review."
    required: false
    default: ""
  diff-path:
    description: "Path to a file holding the unified git diff against the base branch."
    required: true
  model:
    description: "Gemini model id (Vertex). Defaults to full Flash."
    required: false
    default: "gemini-2.5-flash"

outputs:
  result:
    description: "Full ReviewResult as a single-line JSON string."
    value: ${{ steps.review.outputs.result }}
  verdict:
    description: "Binding verdict: 'pass' or 'fail'."
    value: ${{ steps.review.outputs.verdict }}
  min-score:
    description: "Minimum of the six per-criterion scores (1–10)."
    value: ${{ steps.review.outputs.min-score }}

runs:
  using: composite
  steps:
    # ADC is provided by the workflow's google-github-actions/auth step
    # (GOOGLE_APPLICATION_CREDENTIALS in the process env); this action does not
    # authenticate itself. GOOGLE_CLOUD_PROJECT / GOOGLE_CLOUD_REGION are
    # likewise passed through from the workflow env.
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: tools/ai-code-reviewer/.nvmrc

    - name: Install dependencies
      shell: bash
      working-directory: tools/ai-code-reviewer
      run: npm ci

    - name: Build package
      shell: bash
      working-directory: tools/ai-code-reviewer
      run: npm run build

    - name: Run AI code review
      id: review
      shell: bash
      env:
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        DIFF_PATH: ${{ inputs.diff-path }}
        GEMINI_MODEL: ${{ inputs.model }}
      run: |
        set -euo pipefail

        # The CLI emits a single-line ReviewResult JSON to stdout and exits
        # non-zero only on a technical/agent failure (so the workflow can fail
        # closed). A non-zero exit here propagates as a failed step.
        RESULT="$(node "${{ github.workspace }}/tools/ai-code-reviewer/dist/review.js")"

        # verdict + min-score, extracted in-process so the gate never has to
        # parse free-text. stdin is accumulated then parsed once (robust to
        # chunked delivery).
        VERDICT="$(printf '%s' "$RESULT" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>process.stdout.write(JSON.parse(d).verdict))')"
        MIN_SCORE="$(printf '%s' "$RESULT" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const s=JSON.parse(d).scores;process.stdout.write(String(Math.min(...Object.values(s))))})')"

        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
        echo "min-score=$MIN_SCORE" >> "$GITHUB_OUTPUT"

        # Full JSON via a heredoc delimiter — JSON.stringify already escapes
        # newlines so it is single-line, but the delimiter form is the robust
        # GitHub pattern for arbitrary output values.
        {
          echo "result<<__AI_CR_RESULT__"
          printf '%s\n' "$RESULT"
          echo "__AI_CR_RESULT__"
        } >> "$GITHUB_OUTPUT"
