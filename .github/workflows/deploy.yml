name: Deploy

on:
  push:
    branches: [master]

env:
  PROJECT_ID: puls-gpw
  REGION: europe-central2
  IMAGE: europe-central2-docker.pkg.dev/puls-gpw/puls-gpw/puls-gpw

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.puls_gpw_secret }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Update Cloud Run Job (scraper)
        run: |
          gcloud run jobs update puls-gpw \
            --image="${{ env.IMAGE }}:${{ github.sha }}" \
            --command=uv --args="run,python,main.py" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Update Cloud Run Job (post)
        run: |
          gcloud run jobs update puls-gpw-post \
            --image="${{ env.IMAGE }}:${{ github.sha }}" \
            --command=uv --args="run,python,post_main.py" \
            --update-secrets="X_API_KEY=x-api-key:latest,X_API_SECRET=x-api-secret:latest,X_ACCESS_TOKEN=x-access-token:latest,X_ACCESS_SECRET=x-access-secret:latest" \
            --update-env-vars="X_AUTO_PUBLISH=true,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},BIGQUERY_DATASET=espi_ebi" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Deploy Cloud Run Service (api)
        run: |
          gcloud run deploy puls-gpw-api \
            --image="${{ env.IMAGE }}:${{ github.sha }}" \
            --command=uv --args="run,python,api_main.py" \
            --port=8080 \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --service-account=puls-gpw-runner@puls-gpw.iam.gserviceaccount.com \
            --set-secrets="ADMIN_API_KEY=admin-api-key:latest,USER_API_KEY=user-api-key:latest" \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},BIGQUERY_DATASET=espi_ebi" \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=2 \
            --timeout=60
