<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>puls-gpw — panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f6f8; color: #1a1a1a; }

  /* Login */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: #fff; border-radius: 8px; padding: 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 100%; max-width: 360px;
  }
  .login-box h1 { font-size: 1.3rem; margin-bottom: 1.5rem; }
  .login-box label { display: block; font-size: .85rem; margin-bottom: .3rem; color: #555; }
  .login-box input {
    width: 100%; padding: .55rem .75rem; border: 1px solid #ccc;
    border-radius: 5px; font-size: 1rem; margin-bottom: 1rem;
  }
  .login-box button {
    width: 100%; padding: .6rem; background: #2563eb; color: #fff;
    border: none; border-radius: 5px; font-size: 1rem; cursor: pointer;
  }
  .login-box button:hover { background: #1d4ed8; }
  #login-error { color: #dc2626; font-size: .85rem; margin-top: .5rem; display: none; }

  /* Dashboard */
  #dashboard-screen { display: none; padding: 1.5rem; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .topbar h1 { font-size: 1.2rem; }
  .topbar span { font-size: .85rem; color: #555; margin-right: 1rem; }
  .topbar button {
    padding: .4rem .9rem; background: #e5e7eb; border: none;
    border-radius: 5px; cursor: pointer; font-size: .9rem;
  }
  .topbar button:hover { background: #d1d5db; }

  /* Filters */
  .filters {
    display: flex; flex-wrap: wrap; gap: .6rem;
    background: #fff; padding: 1rem; border-radius: 8px;
    margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .filters input, .filters select {
    padding: .4rem .65rem; border: 1px solid #ccc; border-radius: 5px;
    font-size: .9rem; min-width: 120px;
  }
  .filters button {
    padding: .4rem 1rem; background: #2563eb; color: #fff;
    border: none; border-radius: 5px; cursor: pointer; font-size: .9rem;
  }
  .filters button:hover { background: #1d4ed8; }
  /* Datetime hint — wrapper jest flex itemem, hint chowany gdy input aktywny/wypełniony */
  .date-input-wrap { position: relative; min-width: 120px; }
  .date-input-wrap input { width: 100%; }
  .date-input-wrap input:not(.has-value):not(:focus) { color: transparent; }
  .date-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; padding-left: .65rem;
    font-size: .9rem; color: #9ca3af; pointer-events: none;
  }
  .date-input-wrap input.has-value ~ .date-hint,
  .date-input-wrap input:focus ~ .date-hint { display: none; }

  /* Table */
  .table-wrap {
    background: #fff; border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th {
    background: #f9fafb; text-align: left; padding: .6rem .8rem;
    border-bottom: 2px solid #e5e7eb; white-space: nowrap;
  }
  td { padding: .55rem .8rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }
  tr.clickable { cursor: pointer; }
  tr.clickable:active td { background: #eff6ff; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 1000; padding: 0;
  }
  .modal-box {
    background: #fff; border-radius: 16px 16px 0 0;
    width: 100%; max-width: 640px; max-height: 85vh;
    display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem .75rem; border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  .modal-header strong { font-size: 1rem; }
  .modal-close {
    background: #f3f4f6; border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-meta {
    padding: .6rem 1.25rem; font-size: .8rem; color: #6b7280;
    border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .modal-body {
    padding: 1rem 1.25rem 1.5rem; overflow-y: auto;
    font-size: .9rem; line-height: 1.6; color: #1f2937;
    -webkit-overflow-scrolling: touch;
  }

  .score { font-weight: 600; }
  .score.high { color: #16a34a; }
  .score.mid  { color: #d97706; }
  .score.low  { color: #dc2626; }
  .btn-del {
    padding: .25rem .6rem; background: #fee2e2; color: #dc2626;
    border: 1px solid #fca5a5; border-radius: 4px; cursor: pointer;
    font-size: .8rem;
  }
  .btn-del:hover { background: #fecaca; }
  .empty { text-align: center; color: #9ca3af; padding: 2rem; }
  .analysis-summary { max-width: 320px; font-size: .83rem; color: #374151; }

  /* ── Responsive ────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    #dashboard-screen { padding: .75rem; }

    .topbar { flex-wrap: wrap; gap: .4rem; }
    .topbar h1 { flex: 1 1 100%; }

    .filters { gap: .4rem; }
    .filters input, .filters select, .date-input-wrap { flex: 1 1 calc(50% - .2rem); min-width: 0; }
    .date-input-wrap input { min-width: 0; }
    .filters button { width: 100%; }

    /* Mobile: chowamy Score i Analizę — zostaje Data/Spółka/Ticker/Typ + Usuń (admin) */
    .col-score, .col-analysis, .col-url { display: none; }

    th, td { padding: .45rem .5rem; font-size: .82rem; }
  }

  /* Pagination */
  #pagination-bar {
    display: flex; align-items: center; justify-content: center; gap: 1rem;
    padding: .75rem; background: #fff; border-top: 1px solid #e5e7eb;
    border-radius: 0 0 8px 8px;
  }
  #pagination-bar button {
    padding: .4rem 1rem; background: #e5e7eb; border: none;
    border-radius: 5px; cursor: pointer; font-size: .9rem;
  }
  #pagination-bar button:hover:not(:disabled) { background: #d1d5db; }
  #pagination-bar button:disabled { opacity: .4; cursor: default; }
  #pagination-bar span { font-size: .9rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>puls-gpw</h1>
    <label for="api-key-input">Klucz API</label>
    <input type="password" id="api-key-input" placeholder="Wpisz klucz API" autocomplete="current-password">
    <button id="login-btn">Zaloguj się</button>
    <div id="login-error">Nieprawidłowy klucz API</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="topbar">
    <h1>puls-gpw</h1>
    <div>
      <span id="role-badge"></span>
      <button id="logout-btn">Wyloguj</button>
    </div>
  </div>

  <form class="filters" id="filter-form">
    <input type="text"   id="f-ticker"     placeholder="Ticker (np. PKO)">
    <input type="text"   id="f-company"    placeholder="Spółka">
    <input type="text"   id="f-event-type" placeholder="Typ (ESPI/EBI)">
    <div class="date-input-wrap">
      <input type="datetime-local" id="f-from">
      <span class="date-hint">Analizy od</span>
    </div>
    <div class="date-input-wrap">
      <input type="datetime-local" id="f-to">
      <span class="date-hint">Analizy do</span>
    </div>
    <select id="f-page-size"><option value="20" selected>20</option><option value="50">50</option><option value="100">100</option></select>
    <button type="submit">Filtruj</button>
  </form>

  <div class="table-wrap">
    <table id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="pagination-bar">
      <button id="btn-prev" disabled>&#8249; Poprzednia</button>
      <span id="page-label">Strona 1</span>
      <button id="btn-next">Następna &#8250;</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-header">
      <strong id="modal-title"></strong>
      <button class="modal-close" id="modal-close" aria-label="Zamknij">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// ── state ──────────────────────────────────────────────────────────────
let apiKey      = sessionStorage.getItem('apiKey');
let role        = sessionStorage.getItem('role');
let currentPage = 1;

// ── init ───────────────────────────────────────────────────────────────
if (apiKey && role) showDashboard(role);
else               showLogin();

// ── auth ───────────────────────────────────────────────────────────────
$('login-btn').addEventListener('click', async () => {
  const key = $('api-key-input').value.trim();
  if (!key) return;
  $('login-error').style.display = 'none';
  try {
    const r = await fetch('/auth/role', { headers: { 'X-API-Key': key } });
    if (!r.ok) { showLoginError(); return; }
    const data = await r.json();
    sessionStorage.setItem('apiKey', key);
    sessionStorage.setItem('role', data.role);
    apiKey = key; role = data.role;
    showDashboard(role);
  } catch { showLoginError(); }
});

$('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('login-btn').click();
});

$('logout-btn').addEventListener('click', () => {
  sessionStorage.clear();
  apiKey = null; role = null;
  showLogin();
});

window.addEventListener('popstate', e => {
  if (!apiKey) return;
  if (e.state && e.state.page) {
    currentPage = e.state.page;
    const ps = $('f-page-size');
    if (ps && e.state.page_size) ps.value = String(e.state.page_size);
    fetchAnnouncements(false);
  }
});

['f-from','f-to'].forEach(id => {
  const el = $(id);
  el.addEventListener('change', () => el.classList.toggle('has-value', !!el.value));
});

$('filter-form').addEventListener('submit', e => {
  e.preventDefault();
  currentPage = 1;
  fetchAnnouncements();
});

$('f-page-size').addEventListener('change', () => {
  currentPage = 1;
  fetchAnnouncements();
});

$('btn-prev').addEventListener('click', () => {
  if (currentPage > 1) { currentPage--; fetchAnnouncements(); }
});

$('btn-next').addEventListener('click', () => {
  currentPage++;
  fetchAnnouncements();
});

// ── views ──────────────────────────────────────────────────────────────
function showLogin() {
  $('login-screen').style.display    = 'flex';
  $('dashboard-screen').style.display = 'none';
  $('api-key-input').value = '';
}

function showLoginError() {
  $('login-error').style.display = 'block';
}

function showDashboard(r) {
  $('login-screen').style.display    = 'none';
  $('dashboard-screen').style.display = 'block';
  $('role-badge').textContent = r === 'admin' ? '👤 admin' : '👤 user';
  $('data-table').classList.toggle('admin-table', r === 'admin');
  renderHeaders(r);
  fetchAnnouncements(false);
}

// ── table headers ──────────────────────────────────────────────────────
const _ADMIN_COLS = [
  { label: 'Data',    cls: '' },
  { label: 'Spółka',  cls: '' },
  { label: 'Ticker',  cls: '' },
  { label: 'Typ',     cls: '' },
  { label: 'Score',   cls: 'col-score' },
  { label: 'Analiza', cls: 'col-analysis' },
  { label: 'URL',     cls: 'col-url' },
  { label: '',        cls: '' },
];
const _USER_COLS = [
  { label: 'Data',    cls: '' },
  { label: 'Spółka',  cls: '' },
  { label: 'Ticker',  cls: '' },
  { label: 'Typ',     cls: '' },
  { label: 'Analiza', cls: 'col-analysis' },
];

function renderHeaders(r) {
  const cols = r === 'admin' ? _ADMIN_COLS : _USER_COLS;
  $('table-head').innerHTML =
    '<tr>' + cols.map(c => `<th class="${c.cls}">${c.label}</th>`).join('') + '</tr>';
}

// ── fetch ──────────────────────────────────────────────────────────────
async function fetchAnnouncements(push = true) {
  $('btn-prev').disabled = true;
  $('btn-next').disabled = true;
  const params = new URLSearchParams();
  const v = id => $(`f-${id}`) && $(`f-${id}`).value.trim();
  if (v('ticker'))     params.set('ticker',     v('ticker'));
  if (v('company'))    params.set('company',    v('company'));
  if (v('event-type')) params.set('event_type', v('event-type'));
  if (v('from'))       params.set('from',       new Date($('f-from').value).toISOString());
  if (v('to'))         params.set('to',         new Date($('f-to').value).toISOString());
  const pageSize = $('f-page-size').value || '20';
  params.set('page',      currentPage);
  params.set('page_size', pageSize);

  try {
    const r = await fetch('/announcements?' + params, {
      headers: { 'X-API-Key': apiKey }
    });
    if (r.status === 401) { sessionStorage.clear(); showLogin(); return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    $('page-label').textContent = 'Strona ' + currentPage;
    renderTable(data, role);
    $('btn-prev').disabled = currentPage === 1;
    $('btn-next').disabled = data.length < Number(pageSize);
    const histState = { page: currentPage, page_size: Number(pageSize) };
    const histUrl   = '?page=' + currentPage + '&page_size=' + pageSize;
    if (push) history.pushState(histState, '', histUrl);
    else      history.replaceState(histState, '', histUrl);
  } catch (e) {
    $('table-body').innerHTML = `<tr><td colspan="7" class="empty">Błąd ładowania danych</td></tr>`;
    $('btn-prev').disabled = currentPage === 1;
    $('btn-next').disabled = false;
  }
}

// ── render ─────────────────────────────────────────────────────────────
function renderTable(data, r) {
  const tbody = $('table-body');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">Brak wyników</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(row => {
    const date    = row.published_at ? row.published_at.slice(0, 16).replace('T', ' ') : '—';
    const score   = row.analysis_score != null ? row.analysis_score.toFixed(2) : '—';
    const sc      = row.analysis_score >= 0.7 ? 'high' : row.analysis_score >= 0.4 ? 'mid' : 'low';
    const summary = row.structured_analysis?.summary_pl || '';
    const summaryEsc = esc(summary || '—');

    const modalAttrs = `data-company="${esc(row.company||'')}" data-ticker="${esc(row.ticker||'')}" `
      + `data-date="${esc(date)}" data-event="${esc(row.event_type||'')}" `
      + `data-score="${esc(score)}" data-sc="${sc}" data-analysis="${summaryEsc}" `
      + (r === 'admin' && row.url ? `data-url="${esc(row.url)}"` : '');

    if (r === 'admin') {
      return `<tr class="clickable" ${modalAttrs}>
        <td>${date}</td>
        <td>${esc(row.company || '—')}</td>
        <td>${esc(row.ticker || '—')}</td>
        <td>${esc(row.event_type || '—')}</td>
        <td class="col-score"><span class="score ${sc}">${score}</span></td>
        <td class="col-analysis analysis-summary">${summaryEsc}</td>
        <td class="col-url">${(row.url && /^https?:\/\//.test(row.url)) ? `<a href="${esc(row.url)}" target="_blank">link</a>` : (row.url ? esc(row.url) : '—')}</td>
        <td><button class="btn-del" data-id="${esc(row.announcement_id)}">Usuń</button></td>
      </tr>`;
    } else {
      return `<tr class="clickable" ${modalAttrs}>
        <td>${date}</td>
        <td>${esc(row.company || '—')}</td>
        <td>${esc(row.ticker || '—')}</td>
        <td>${esc(row.event_type || '—')}</td>
        <td class="col-analysis analysis-summary">${summaryEsc}</td>
      </tr>`;
    }
  }).join('');

  // delete handlers (admin only)
  tbody.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteRow(btn.dataset.id, btn.closest('tr')); });
  });

  // row click → modal
  tbody.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => openModal(tr.dataset));
  });
}

// ── delete ─────────────────────────────────────────────────────────────
async function deleteRow(id, tr) {
  if (!confirm('Usunąć ogłoszenie?')) return;
  try {
    const r = await fetch(`/announcements/${encodeURIComponent(id)}`, {
      method: 'DELETE', headers: { 'X-API-Key': apiKey }
    });
    if (r.status === 204)      tr.remove();
    else if (r.status === 404) alert('Nie znaleziono ogłoszenia.');
    else                       alert('Błąd usuwania.');
  } catch { alert('Błąd połączenia.'); }
}

// ── modal ──────────────────────────────────────────────────────────────
function openModal(d) {
  const ticker = d.ticker ? ` ($${d.ticker})` : '';
  $('modal-title').textContent = (d.company || '—') + ticker;
  $('modal-meta').textContent  = [d.date, d.event].filter(Boolean).join(' · ');
  let body = d.analysis && d.analysis !== '—' ? d.analysis : 'Brak analizy.';
  if (role === 'admin' && d.score && d.score !== '—') body += `\n\nScore: ${d.score}`;
  if (role === 'admin' && d.url) body += `\n\n🔗 ${d.url}`;
  $('modal-body').textContent = body;
  $('modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  $('modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
$('modal-close').addEventListener('click', closeModal);
$('modal-overlay').addEventListener('click', e => { if (e.target === $('modal-overlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── util ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
